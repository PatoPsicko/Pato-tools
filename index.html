<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pato's Tools</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-toolbox"></i>
                    <span>Pato's Tools</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-tool="bg-remover">
                    <i class="fa-solid fa-image"></i>
                    <span>Quitar Fondo</span>
                </a>
                <!-- Future tools will go here -->
            </nav>
            <div class="sidebar-footer">
                <p>v1.0.0</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1 id="current-tool-title">Quitar Fondo de Imagen</h1>
            </header>

            <div class="tool-container">
                <!-- Background Remover Tool Section -->
                <section id="bg-remover" class="tool-section active">
                    <div class="card upload-area" id="drop-zone">
                        <i class="fa-solid fa-cloud-arrow-up upload-icon"></i>
                        <h3>Sube o arrastra una imagen</h3>
                        <p>Formatos soportados: JPG, PNG, WebP</p>
                        <input type="file" id="file-input" accept="image/*" hidden>
                        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">
                            Seleccionar Archivo
                        </button>
                    </div>

                    <div class="card result-area" id="result-area" style="display: none;">
                        <div class="image-comparison">
                            <div class="image-box">
                                <h4>Original</h4>
                                <img id="original-image" src="" alt="Original">
                            </div>
                            <div class="image-box">
                                <h4>Sin Fondo</h4>
                                <div class="checkerboard-bg">
                                    <img id="processed-image" src="" alt="Procesada">
                                </div>
                            </div>
                        </div>

                        <div class="action-buttons">
                            <button class="btn btn-secondary" id="btn-reset">
                                <i class="fa-solid fa-rotate-left"></i> Nueva Imagen
                            </button>
                            <button class="btn btn-primary" id="btn-download">
                                <i class="fa-solid fa-download"></i> Descargar
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Placeholder for future tools -->
            </div>

            <!-- Loading Overlay -->
            <div class="loading-overlay" id="loading-overlay">
                <div class="spinner"></div>
                <h3 id="loading-text">Cargando modelos de IA...</h3>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script type="module" src="js/tools/bg-remover.js"></script>
</body>

</html>
